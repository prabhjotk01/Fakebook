<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Prabhjot Kaur">
        <meta name="description" content="My first web page">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <link rel="icon" href="./assets/media/favicon.png?v=2" type="image/x-icon">
        <title>Fakebook</title>
        <link rel="stylesheet" href="./assets/styles/index.css" media="all">
        <script src="./assets/script/app.js"type="module" defer></script>
    </head>
    <body>
        <header>
            <h2>Fakebook</h2>

            <nav class="nav-boxes">
                <div class="nav-item">Friends</div>
                <div class="nav-item">Pages</div>
                <div class="nav-item">Groups</div>
                <div class="nav-item">Settings</div>
            </nav>

            <img src="assets/media/profile.png" alt="Profile" class="profile-pic">

        </header>
        <main>
            <div class="container">
            
                <div class="post-box">
                    <textarea id="postText" placeholder="Hello"></textarea>
                    <div class="post-actions">
                        <label class="file-label">
                        <input type="file" id="postImage">
                        </label>
                        <button id="postBtn" disabled>Post</button>
                    </div>
                </div>
                <section id="posts"></section>
            </div>
        </main>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span id="closeModal">&times;</span>

                <h3>User Info</h3>
                <div id="userInfo"></div>
            </div>
        </div>
    </body>
</html>
